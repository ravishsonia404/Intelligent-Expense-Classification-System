<!DOCTYPE html>
<html lang="eng">
<head>
    <title>AI Finance Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>AI Expense Classifier 💰</h1>

        <form method="POST">
            <input type="text" name="text" placeholder="Enter expense..." required>
            <button type="submit">Predict</button>
        </form>

        {% if result %}
            <h2>Category: {{ result }}</h2>
        {% endif %}
    </div>
<form action="/upload" method="POST" enctype="multipart/form-data">
    <h3>Upload CSV File</h3>
    <input type="file" name="file" required>
    <button type="submit">Upload & Analyze</button>
</form>
<a href="/chat">
    <button>Open Chatbot 🤖</button>
</a>
</body>
</html>
