<!DOCTYPE html>
<html>
<head>
    <title>AI Finance Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f172a;
            color: white;
        }

        .container {
            width: 60%;
            margin: auto;
            margin-top: 20px;
            background: #1e293b;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            height: 90vh;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
        }

        .header {
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 1px solid #334155;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
        }

        .user {
            justify-content: flex-end;
        }

        .bot {
            justify-content: flex-start;
        }

        .bubble {
            padding: 12px 15px;
            border-radius: 12px;
            max-width: 70%;
            line-height: 1.4;
        }

        .user .bubble {
            background: #2563eb;
        }

        .bot .bubble {
            background: #334155;
        }

        .input-box {
            display: flex;
            padding: 15px;
            border-top: 1px solid #334155;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #0f172a;
            color: white;
        }

        button {
            margin-left: 10px;
            padding: 12px 18px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #16a34a;
        }

        .typing {
            display: inline-block;
            background: #334155;
            padding: 10px 15px;
            border-radius: 10px;
        }

        .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            margin: 2px;
            background: white;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }
        }

        .back {
            text-align: center;
            padding: 10px;
        }

        .back a {
            color: #38bdf8;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        🤖 AI Finance Assistant
    </div>

    <div class="chat-box" id="chatBox">

        {% if history %}
            {% for chat in history %}

                <div class="message user">
                    <div class="bubble">
                        {{ chat.user }}
                    </div>
                </div>

                <div class="message bot">
                    <div class="bubble">
                        {{ chat.bot }}
                    </div>
                </div>

            {% endfor %}
        {% endif %}

        <!-- Typing animation -->
        <div class="message bot" id="typing" style="display:none;">
            <div class="typing">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>

    </div>

    <form method="POST" class="input-box" onsubmit="showTyping()">
        <input type="text" name="message" placeholder="Ask anything about your expenses..." required>
        <button type="submit">Send</button>
    </form>

    <div class="back">
        <a href="/">⬅ Back to Home</a>
    </div>

</div>

<script>
    var chatBox = document.getElementById("chatBox");
    chatBox.scrollTop = chatBox.scrollHeight;

    function showTyping() {
        document.getElementById("typing").style.display = "flex";
    }
</script>

</body>
</html>
